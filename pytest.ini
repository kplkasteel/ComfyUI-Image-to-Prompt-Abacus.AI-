[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git .venv venv __pycache__ *.egg-info .. 
addopts = 
    -v
    --tb=short
    --strict-markers
    --ignore=__init__.py
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
